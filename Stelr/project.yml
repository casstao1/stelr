name: Stelr

options:
  deploymentTarget:
    iOS: "17.0"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

targets:
  stelr:
    type: application
    platform: iOS
    sources:
      - path: Stelr/App
      - path: Stelr/Assets.xcassets
        buildPhase: resources
      - path: Stelr/Components
      - path: Stelr/Config
      - path: Stelr/Extensions
      - path: Stelr/Models
      - path: Stelr/Services
      - path: Stelr/ViewModels
      - path: Stelr/Views/ConstellationView.swift
      - path: Stelr/Views/FeedView.swift
      - path: Stelr/Views/HomeView.swift
      - path: Stelr/Views/ProfileView.swift
      - path: Stelr/Views/RotationView.swift
      - path: Stelr/Views/Sheets
    info:
      path: Stelr/Info.plist
      properties:
        CFBundleDisplayName: stelr
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            api.tvmaze.com:
              NSExceptionAllowsInsecureHTTPLoads: false
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: 1.0
        PRODUCT_BUNDLE_IDENTIFIER: com.stelr.app
        PRODUCT_NAME: stelr
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: 1
    dependencies:
      - package: Supabase
        product: Supabase
